# Based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    # Formatter-incompatible — these MUST be ignored, the formatter rejects code that satisfies them.
    "D203",   # no-blank-line-before-class
    "D212",   # multi-line-summary-first-line
    "COM812", # missing-trailing-comma
    "ISC001", # implicit-string-concatenation

    # Defensive integration paths legitimately use typing.Any because the
    # matter-server / python-matter-server / HA matter-client APIs shift across
    # versions and we adapt by duck-typing. Hard typing here would be brittle.
    "ANN401", # any-type
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
# Test files have different idioms than production code. These ignores match
# how home-assistant/core treats its own tests — pytest assertions, fixture
# private-state poking, and parametrized magic numbers are all expected.
"tests/**/*.py" = [
    "S101",    # `assert` is the standard pytest idiom
    "SLF001",  # tests poke private state to set up fixtures
    "PLR2004", # magic numbers are inherent to assertions
    "ARG001",  # fixture-injected parameters are typed as unused
    "ARG002",
    "D",       # not requiring docstrings on every test function
    "INP001",  # tests/ is intentionally not a package on the import path
    "PLR0913", # many arguments — fixture chains
    "FBT001",  # bool positional fine in parametrize
    "FBT002",
]
